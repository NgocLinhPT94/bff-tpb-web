# =============================================================================
# tpb-web-bff - Local Development Environment (docker-compose)
# =============================================================================
# Standalone dev setup — includes BFF + its own postgres + redis.
# Does NOT require other repos to be running.
#
# Usage:
#   cp .env.docker.example .env   # First time setup
#   docker compose up -d          # Start all services
#   docker compose logs -f bff    # Follow BFF logs
#   docker compose down           # Stop all
#   docker compose down -v        # Stop and remove volumes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # BFF - NestJS (Backend-For-Frontend)
  # ---------------------------------------------------------------------------
  bff:
    container_name: tpb-bff
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./src:/opt/app/src
      - ./package.json:/opt/package.json
      - ./pnpm-lock.yaml:/opt/pnpm-lock.yaml
      - ./.env:/opt/app/.env
    ports:
      - "${PORT:-3001}:3001"
    networks:
      - bff-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    container_name: tpb-bff-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME:-tpb_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tpb_password}
      - POSTGRES_DB=${DB_NAME:-tpb_bff_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - bff-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tpb_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    container_name: tpb-bff-redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - bff-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# =============================================================================
# Networks
# =============================================================================
networks:
  bff-network:
    driver: bridge
    name: tpb-bff-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
